/* ── 경량 활용형 패턴 매칭 (사전 로딩 없음) ── */

// 입력 단어로부터 검색에 쓸 어근(들) 후보를 반환
function getRoots(word) {
  if (!word) return [word];
  const roots = new Set([word]);

  // 1) 흔한 활용 어미를 벗겨내서 어근 후보 추가
  const suffixes = [
    // て형/た형
    "って","った","っている","っていた","っていて","っていく","ってくる","ってしまう","ってしまった",
    "いて","いた","いている","いていた",
    "んで","んだ","んでいる","んでいた",
    "いで","いだ",
    // 연용형 (い단)
    "り","り出す","り出した","り出して","り込む","り込んだ","り込んで",
    // 미연형 (あ단 + ない)
    "らない","らなかった","らなくて","わない","わなかった","わなくて",
    "かない","かなかった","さない","さなかった","たない","たなかった",
    "ばない","ばなかった","まない","まなかった","なない","ななかった",
    // 가능형
    "れる","れた","れない","れなかった",
    // 수동/사역
    "られる","られた","させる","させた","させない",
    // 一段동사 어미
    "て","た","ない","ながら","なかった","ていた","ている","ていく","てくる",
    "てしまう","てしまった","てしまって","てほしい","てもいい","ておく",
    "たい","たかった","たくない",
    "れば","たら","ても","でも",
    // 丁寧형
    "ます","ました","ません","ませんでした","ましょう","まして",
  ];

  for (const suf of suffixes) {
    if (word.endsWith(suf) && word.length > suf.length) {
      const root = word.slice(0, word.length - suf.length);
      roots.add(root);
      // 五段동사: 어근 + 음편 복원 후보
      roots.add(root + "る");  // 一段
      roots.add(root + "く");  // 五段 か행
      roots.add(root + "ぐ");  // 五段 が행
      roots.add(root + "す");  // 五段 さ행
      roots.add(root + "つ");  // 五段 た행
      roots.add(root + "ぬ");  // 五段 な행
      roots.add(root + "ぶ");  // 五段 ば행
      roots.add(root + "む");  // 五段 ま행
      roots.add(root + "う");  // 五段 わ행
    }
  }

  // 2) 이미 기본형처럼 생긴 경우 어근만 추가 (마지막 글자 제거)
  const basicEndings = ["る","く","ぐ","す","つ","ぬ","ぶ","む","う","い","な"];
  if (basicEndings.some(e => word.endsWith(e))) {
    roots.add(word.slice(0, -1));
  }

  return [...roots].filter(r => r.length > 0);
}

// 어근 후보들로 가사 줄 매칭
function getBaseForm(_, word) { return word; } // API 호환용 (tokenizer 인자 무시)

function findMatchPositions(_, line, searchWord) {
  const roots = getRoots(searchWord);
  const positions = [];
  for (const root of roots) {
    if (!root || root.length < 1) continue;
    let idx = 0;
    while ((idx = line.indexOf(root, idx)) !== -1) {
      // 이미 추가된 범위와 겹치면 스킵
      if (!positions.some(p => idx < p.end && idx + root.length > p.start)) {
        positions.push({ start: idx, end: idx + root.length, surface: line.slice(idx, idx + root.length) });
      }
      idx += root.length;
    }
  }
  return positions.sort((a,b) => a.start - b.start);
}

function findExamples(_, songs, word) {
  const roots = getRoots(word);
  const result = [];
  for (const song of songs) {
    for (const line of (song.lyrics||"").split("\n").filter(l=>l.trim())) {
      const positions = findMatchPositions(null, line, word);
      if (positions.length > 0) {
        result.push({ songTitle:song.title, artist:song.artist||"", sentence:line.trim(), positions, baseForm:word });
      }
    }
  }
  return result;
}

/* ── 하이라이트 렌더러 ── */
function HighlightedLine({ sentence, positions, baseForm, originalWord }) {
  if (!positions || positions.length === 0) {
    // fallback: 그냥 원래 단어로 하이라이트
    const parts = sentence.split(originalWord);
    return (
      <span>
        {parts.map((p, i) => (
          <span key={i}>{p}{i<parts.length-1 && <mark style={{ background:"rgba(212,168,83,.15)", color:"var(--gold)", fontWeight:700, borderRadius:4, padding:"1px 3px", boxShadow:"0 0 8px rgba(212,168,83,.2)" }}>{originalWord}</mark>}</span>
        ))}
      </span>
    );
  }

  // positions 기반 하이라이트
  const parts = [];
  let cursor = 0;
  for (const pos of positions) {
    if (cursor < pos.start) parts.push({ text:sentence.slice(cursor, pos.start), highlight:false });
    parts.push({ text:pos.surface, highlight:true });
    cursor = pos.end;
  }
  if (cursor < sentence.length) parts.push({ text:sentence.slice(cursor), highlight:false });

  return (
    <span>
      {parts.map((p, i) => p.highlight
        ? <mark key={i} style={{ background:"rgba(212,168,83,.15)", color:"var(--gold)", fontWeight:700, borderRadius:4, padding:"1px 3px", boxShadow:"0 0 8px rgba(212,168,83,.2)" }}>{p.text}</mark>
        : <span key={i}>{p.text}</span>
      )}
    </span>
  );
}

══════════════════════════════════════════ */
function App() {
  // 경량 패턴 매칭 — 사전 로딩 없음
  const tokenizer = true; // 항상 준비됨
  const [nickname, setNickname] = useState(()=>localStorage.getItem("vocab_nick")||"");
  const [tab, setTab]           = useState("search");
  const [songs, setSongs]       = useState([]);
  const [words, setWords]       = useState([]);
  const [bookmarks, setBookmarks] = useState([]);
  const [loading, setLoading]   = useState(true);

  const [query, setQuery]             = useState("");
  const [searchResult, setSearchResult] = useState(null);
  const [showForm, setShowForm]       = useState(false);
  const [savingWord, setSavingWord]   = useState(false);

  const [selectedSong, setSelectedSong] = useState(null);
  const [showAddSong, setShowAddSong]   = useState(false);
  const [newSong, setNewSong] = useState({ title:"", artist:"", lyrics:"" });
  const [toast, setToast] = useState(null);

  function fire(msg, type="ok") { setToast({msg,type}); setTimeout(()=>setToast(null),2500); }

  useEffect(() => {
    if (!nickname) return;
    Promise.all([
      sb.from("songs").select("*"),
      sb.from("words").select("*"),
      sb.from("bookmarks").select("*").eq("nickname",nickname)
    ]).then(([s,w,b]) => {
      setSongs(s.data||[]);
      setWords(w.data||[]);
      setBookmarks(b.data||[]);
      setLoading(false);
    });
    const ch = sb.channel("all")
      .on("postgres_changes",{event:"*",schema:"public",table:"songs"},  ()=>sb.from("songs").select("*").then(r=>setSongs(r.data||[])))
      .on("postgres_changes",{event:"*",schema:"public",table:"words"},  ()=>sb.from("words").select("*").then(r=>setWords(r.data||[])))
      .on("postgres_changes",{event:"*",schema:"public",table:"bookmarks"},()=>sb.from("bookmarks").select("*").eq("nickname",nickname).then(r=>setBookmarks(r.data||[])))
      .subscribe();
    return ()=>sb.removeChannel(ch);
  }, [nickname]);

  function handleNickname(n) { localStorage.setItem("vocab_nick",n); setNickname(n); }

  function handleSearch() {
    const w = query.trim();
    if (!w) return;
    const baseForm = getBaseForm(tokenizer, w);
    // words DB는 기본형으로 저장되므로 기본형으로 조회
    const found = words.find(x => x.word === baseForm || x.word === w) || null;
    const examples = findExamples(tokenizer, songs, w);
    setSearchResult({ word:w, baseForm, found, examples });
    setShowForm(!found);
  }

  async function saveWord(form) {
    setSavingWord(true);
    // 항상 기본형으로 저장
    const wordToSave = searchResult.baseForm || searchResult.word;
    const payload = { word:wordToSave, ...form, added_by:nickname };
    let res;
    if (searchResult.found) {
      res = await sb.from("words").update(payload).eq("id",searchResult.found.id).select().single();
      fire("수정했어요 ✏️");
    } else {
      res = await sb.from("words").insert(payload).select().single();
      fire("등록 완료! 모두와 공유됩니다 🌐");
    }
    setSearchResult(r=>({...r, found:res.data}));
    setShowForm(false);
    setSavingWord(false);
  }

  async function toggleBookmark() {
    const w = searchResult; if (!w) return;
    const exists = bookmarks.find(b=>b.word===w.word||b.word===w.baseForm);
    if (exists) {
      await sb.from("bookmarks").delete().eq("id",exists.id);
      fire("단어장에서 제거했어요");
    } else {
      const fd = w.found;
      await sb.from("bookmarks").insert({ nickname, word:w.baseForm||w.word, reading:fd?.reading||"", meaning_ko:fd?.meaning_ko||"(미등록)", part_of_speech:fd?.part_of_speech||"", note:fd?.note||"", examples:JSON.stringify(w.examples) });
      fire("내 단어장에 저장했어요! 📚");
    }
  }

  async function addSong() {
    if (!newSong.title.trim()||!newSong.lyrics.trim()) return;
    await sb.from("songs").insert({...newSong, added_by:nickname});
    setNewSong({title:"",artist:"",lyrics:""});
    setShowAddSong(false);
    fire(`"${newSong.title}" 추가 완료!`);
  }

  async function deleteSong(id,e) { e.stopPropagation(); await sb.from("songs").delete().eq("id",id); }
  async function deleteBookmark(id) { await sb.from("bookmarks").delete().eq("id",id); fire("삭제했어요"); }

  // ── guards ──
  if (!nickname) return <NicknameScreen onDone={handleNickname} dictProgress={100} dictReady={true} />;

  const isBookmarked = searchResult && bookmarks.find(b=>b.word===searchResult.word||b.word===searchResult.baseForm);

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
      <div style={{ position:"fixed", width:700, height:700, borderRadius:"50%", background:"radial-gradient(circle,rgba(167,139,250,.04),transparent 70%)", top:-200, right:-200, pointerEvents:"none", zIndex:0 }} />
      <div style={{ position:"fixed", width:500, height:500, borderRadius:"50%", background:"radial-gradient(circle,rgba(212,168,83,.04),transparent 70%)", bottom:-100, left:-100, pointerEvents:"none", zIndex:0 }} />

      {toast && <Toast msg={toast.msg} type={toast.type} />}

      <div style={{ position:"relative", zIndex:1, maxWidth:660, margin:"0 auto", padding:"0 16px 100px" }}>

        {/* Header */}
        <div style={{ padding:"36px 0 28px", textAlign:"center" }}>
          <div style={{ fontSize:10, letterSpacing:5, color:"var(--text-mute)", textTransform:"uppercase", marginBottom:12 }}>Japanese Lyric Dictionary</div>
          <h1 className="jp" style={{ fontSize:40, fontWeight:700, background:"linear-gradient(135deg,#f0e0c0 0%,var(--gold) 35%,#d4a0f0 70%,var(--purple) 100%)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", letterSpacing:"-.02em", lineHeight:1.1, marginBottom:10 }}>케혼동</h1>
          <div style={{ display:"flex", alignItems:"center", gap:12, margin:"14px 0" }}>
            <div style={{ flex:1, height:1, background:"linear-gradient(to right,transparent,var(--border))" }} />
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:"var(--gold-dim)" }} />
              <span style={{ fontSize:11, color:"var(--text-mute)" }}>👤 {nickname}</span>
              <button className="tab-btn" onClick={()=>{localStorage.removeItem("vocab_nick");setNickname("");}} style={{ fontSize:10, color:"var(--text-mute)", borderBottom:"1px solid var(--text-mute)", lineHeight:1.2 }}>변경</button>
              <div style={{ width:6, height:6, borderRadius:"50%", background:"var(--gold-dim)" }} />
            </div>
            <div style={{ flex:1, height:1, background:"linear-gradient(to left,transparent,var(--border))" }} />
          </div>
          {/* 형태소 분석 뱃지 */}
          <div style={{ display:"inline-flex", alignItems:"center", gap:6, background:"rgba(167,139,250,.08)", border:"1px solid rgba(167,139,250,.2)", borderRadius:20, padding:"4px 12px", fontSize:11, color:"var(--purple)" }}>
            <span style={{ width:5, height:5, borderRadius:"50%", background:"#4ade80", display:"inline-block", boxShadow:"0 0 5px #4ade80" }} />
            활용형 매칭 활성화 · 走り出した → 走 자동 검색
          </div>
        </div>

        {/* Tabs */}
        <div style={{ marginBottom:24 }}>
          <TabBar tab={tab} setTab={setTab} counts={{ words:words.length, songs:songs.length, bookmarks:bookmarks.length }} />
        </div>

        {/* ════ SEARCH ════ */}
        {tab==="search" && (
          <div>
            <div style={{ display:"flex", gap:8, marginBottom:20 }}>
              <div style={{ position:"relative", flex:1 }}>
                <input className="input-base jp" value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSearch()} placeholder="단어 입력 (예: 走る、溶けて、夜に)" style={{ fontSize:17, paddingRight:42 }} />
                {query && <button className="btn" onClick={()=>{setQuery("");setSearchResult(null);}} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", color:"var(--text-mute)", fontSize:16 }}>✕</button>}
              </div>
              <button className="btn" onClick={handleSearch} style={{ background:"linear-gradient(135deg,#c9943a,#a07828)", color:"#080604", borderRadius:12, padding:"0 22px", fontWeight:700, fontSize:14, boxShadow:"0 4px 16px rgba(212,168,83,.2)" }}>
                <span className="jp">検索</span>
              </button>
            </div>

            {searchResult && (
              <div className="fade-up">
                {/* 매칭 어근 표시 */}
                {searchResult.examples.length > 0 && searchResult.word.length > 1 && (
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12, padding:"10px 14px", background:"rgba(167,139,250,.06)", border:"1px solid rgba(167,139,250,.15)", borderRadius:12, fontSize:12, flexWrap:"wrap" }}>
                    <span style={{ color:"var(--purple)" }}>✦</span>
                    <span className="jp" style={{ color:"var(--text-dim)" }}>{searchResult.word}</span>
                    <span style={{ color:"var(--text-mute)" }}>의 활용형을 포함해 {searchResult.examples.length}개 예문 발견</span>
                  </div>
                )}

                {/* 단어 카드 */}
                <div className="card" style={{ marginBottom:10, overflow:"hidden" }}>
                  <div style={{ padding:"24px 24px 20px", background:"linear-gradient(135deg,rgba(22,18,40,.8),var(--surface))", borderBottom:"1px solid var(--border)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
                      <div style={{ flex:1 }}>
                        {searchResult.found?.part_of_speech && <div className="tag" style={{ marginBottom:10 }}>{searchResult.found.part_of_speech}</div>}
                        <div className="jp" style={{ fontSize:44, fontWeight:700, color:"var(--text)", lineHeight:1, letterSpacing:"-.02em" }}>
                          {searchResult.baseForm || searchResult.word}
                        </div>
                        {searchResult.found?.reading && <div style={{ fontSize:15, color:"var(--purple)", marginTop:8, letterSpacing:".05em" }}>{searchResult.found.reading}</div>}
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:8, flexShrink:0 }}>
                        <button className="btn" onClick={toggleBookmark} style={{ background:isBookmarked?"rgba(167,139,250,.15)":"transparent", border:`1px solid ${isBookmarked?"var(--purple-dim)":"var(--border2)"}`, color:isBookmarked?"var(--purple)":"var(--text-mute)", borderRadius:10, padding:"8px 14px", fontSize:12, fontWeight:500 }}>
                          {isBookmarked ? "★ 저장됨" : "☆ 저장"}
                        </button>
                        <button className="btn" onClick={()=>setShowForm(f=>!f)} style={{ background:"transparent", border:"1px solid var(--border2)", color:"var(--text-mute)", borderRadius:10, padding:"7px 14px", fontSize:11 }}>
                          {searchResult.found ? "✏️ 수정" : "+ 뜻 등록"}
                        </button>
                      </div>
                    </div>
                    {searchResult.found ? (
                      <div style={{ marginTop:18 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                          <span className="tag">{searchResult.found.part_of_speech}</span>
                          <span style={{ fontSize:11, color:"var(--text-mute)" }}>등록: {searchResult.found.added_by}</span>
                        </div>
                        <div style={{ fontSize:20, color:"var(--gold)", fontWeight:500, background:"rgba(212,168,83,.07)", padding:"13px 16px", borderRadius:12, border:"1px solid rgba(212,168,83,.12)" }}>
                          {searchResult.found.meaning_ko}
                        </div>
                        {searchResult.found.note && (
                          <div style={{ marginTop:10, fontSize:12, color:"var(--text-dim)", background:"var(--surface2)", padding:"11px 14px", borderRadius:10, borderLeft:"2px solid var(--purple-dim)", lineHeight:1.8 }}>
                            {searchResult.found.note}
                          </div>
                        )}
                      </div>
                    ) : (
                      <div style={{ marginTop:16, padding:"14px 16px", background:"var(--surface2)", borderRadius:12, border:"1px dashed var(--border2)", textAlign:"center" }}>
                        <div style={{ fontSize:13, color:"var(--text-dim)", marginBottom:4 }}>아직 등록된 뜻이 없어요</div>
                        <div style={{ fontSize:11, color:"var(--text-mute)" }}>등록하면 동아리원 모두와 공유돼요 🌐</div>
                      </div>
                    )}
                  </div>

                  {/* 예문 */}
                  <div style={{ padding:"18px 24px" }}>
                    <div style={{ fontSize:11, letterSpacing:3, color:"var(--text-mute)", marginBottom:14, display:"flex", alignItems:"center", gap:8 }}>
                      🎵 가사 예문
                      <span style={{ background:"var(--surface2)", color:"var(--text-dim)", padding:"2px 8px", borderRadius:20, fontSize:10 }}>{searchResult.examples.length}개</span>
                      {searchResult.baseForm !== searchResult.word && (
                        <span style={{ fontSize:10, color:"var(--purple)", background:"rgba(167,139,250,.08)", padding:"2px 8px", borderRadius:20 }}>활용형 포함</span>
                      )}
                    </div>
                    {searchResult.examples.length === 0 ? (
                      <div style={{ textAlign:"center", padding:"20px 0", color:"var(--text-mute)", fontSize:12, border:"1px dashed var(--border)", borderRadius:12 }}>
                        등록된 노래에서 찾지 못했어요
                      </div>
                    ) : (
                      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                        {searchResult.examples.map((ex, i) => (
                          <div key={i} style={{ background:"var(--surface2)", border:"1px solid var(--border)", borderRadius:12, padding:"13px 16px" }}>
                            <div style={{ fontSize:10, color:"var(--text-mute)", marginBottom:7, display:"flex", alignItems:"center", gap:6 }}>
                              <span style={{ color:"var(--gold-dim)" }}>♪</span>
                              <span>{ex.songTitle}</span>
                              {ex.artist && <span style={{ color:"var(--border2)" }}>· {ex.artist}</span>}
                              {ex.positions?.length > 0 && ex.positions[0].surface !== searchResult.word && (
                                <span style={{ color:"var(--purple)", background:"rgba(167,139,250,.1)", padding:"1px 6px", borderRadius:10, fontSize:9 }}>
                                  {ex.positions[0].surface} (활용형)
                                </span>
                              )}
                            </div>
                            <div className="jp" style={{ fontSize:16, color:"#d4c8b4", lineHeight:1.9 }}>
                              <HighlightedLine sentence={ex.sentence} positions={ex.positions} baseForm={ex.baseForm} originalWord={searchResult.word} />
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                {showForm && (
                  <WordForm word={searchResult.word} baseForm={searchResult.baseForm} existing={searchResult.found} onSave={saveWord} onCancel={()=>setShowForm(false)} saving={savingWord} />
                )}
              </div>
            )}

            {!searchResult && (
              <div className="fade-in" style={{ textAlign:"center", padding:"60px 0" }}>
                <div className="jp pulse" style={{ fontSize:52, marginBottom:18, opacity:.2 }}>詞</div>
                <div style={{ fontSize:14, color:"var(--text-mute)", lineHeight:1.8 }}>
                  가사 속 단어를 검색해보세요<br/>
                  <span style={{ fontSize:12 }}>走り出した 입력 시 走 어근으로 활용형 전체 검색</span>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ════ SHARED WORDS ════ */}
        {tab==="words" && (
          <div className="fade-in">
            <div style={{ fontSize:12, color:"var(--text-mute)", marginBottom:16, display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ width:6, height:6, borderRadius:"50%", background:"#4ade80", display:"inline-block", boxShadow:"0 0 6px #4ade80" }} />
              동아리원이 함께 만드는 단어 사전 · {words.length}개 (기본형으로 저장)
            </div>
            {words.length === 0 ? (
              <div style={{ textAlign:"center", padding:"60px 0", color:"var(--text-mute)" }}>
                <div className="jp" style={{ fontSize:40, opacity:.2, marginBottom:16 }}>空</div>
                <div style={{ fontSize:13 }}>아직 등록된 단어가 없어요</div>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {[...words].sort((a,b)=>a.word.localeCompare(b.word,"ja")).map(w => (
                  <div key={w.id} className="card card-gold" style={{ padding:"16px 20px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ display:"flex", alignItems:"baseline", gap:10, flexWrap:"wrap", marginBottom:6 }}>
                          <span className="jp" style={{ fontSize:24, color:"var(--text)", fontWeight:500 }}>{w.word}</span>
                          {w.reading && <span style={{ fontSize:13, color:"var(--purple)" }}>{w.reading}</span>}
                          {w.part_of_speech && <span className="tag">{w.part_of_speech}</span>}
                        </div>
                        <div style={{ fontSize:16, color:"var(--gold)", marginBottom:4 }}>{w.meaning_ko}</div>
                        {w.note && <div style={{ fontSize:11, color:"var(--text-mute)", lineHeight:1.6 }}>{w.note}</div>}
                        <div style={{ fontSize:10, color:"var(--text-mute)", marginTop:6 }}>등록: {w.added_by}</div>
                      </div>
                      <button className="btn" onClick={()=>{ setQuery(w.word); setTab("search"); const bf=getBaseForm(tokenizer,w.word); setSearchResult({word:w.word,baseForm:bf,found:w,examples:findExamples(tokenizer,songs,w.word)}); setShowForm(false); }} style={{ background:"var(--surface2)", border:"1px solid var(--border2)", color:"var(--text-mute)", borderRadius:10, padding:"7px 12px", fontSize:11, whiteSpace:"nowrap" }}>
                        예문 →
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ════ SONGS ════ */}
        {tab==="songs" && (
          <div className="fade-in">
            {selectedSong ? (
              <>
                <button className="tab-btn" onClick={()=>setSelectedSong(null)} style={{ color:"var(--text-mute)", fontSize:13, marginBottom:18, display:"flex", alignItems:"center", gap:6 }}>← 목록으로</button>
                <div className="card" style={{ overflow:"hidden" }}>
                  <div style={{ padding:"24px", borderBottom:"1px solid var(--border)", background:"linear-gradient(135deg,rgba(22,18,40,.9),var(--surface))" }}>
                    <div style={{ fontSize:10, letterSpacing:4, color:"var(--text-mute)", marginBottom:8 }}>LYRICS</div>
                    <div className="jp" style={{ fontSize:24, color:"var(--text)", marginBottom:4 }}>{selectedSong.title}</div>
                    {selectedSong.artist && <div style={{ fontSize:13, color:"var(--text-mute)" }}>{selectedSong.artist}</div>}
                  </div>
                  <div style={{ padding:"24px 28px" }}>
                    {selectedSong.lyrics.split("\n").map((line,i) => (
                      <div key={i} className="jp" onClick={()=>{ if(line.trim()){setQuery(line.trim());setTab("search");const bf=getBaseForm(tokenizer,line.trim());const found=words.find(x=>x.word===bf||x.word===line.trim())||null;setSearchResult({word:line.trim(),baseForm:bf,found,examples:findExamples(tokenizer,songs,line.trim())});setShowForm(!found);}}}
                        style={{ fontSize:17, color:"#c8bca8", lineHeight:2.4, padding:"2px 10px", margin:"0 -10px", borderRadius:8, minHeight:line.trim()?"auto":20, transition:"background .15s,color .15s", cursor:line.trim()?"pointer":"default" }}
                        onMouseEnter={e=>line.trim()&&Object.assign(e.currentTarget.style,{background:"rgba(212,168,83,.06)",color:"var(--text)"})}
                        onMouseLeave={e=>Object.assign(e.currentTarget.style,{background:"transparent",color:"#c8bca8"})}>
                        {line||"\u00A0"}
                      </div>
                    ))}
                    <div style={{ marginTop:16, fontSize:11, color:"var(--text-mute)", textAlign:"center" }}>줄을 클릭하면 해당 줄 전체를 검색해요</div>
                  </div>
                </div>
              </>
            ) : (
              <>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <div style={{ fontSize:12, color:"var(--text-mute)", display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ width:6, height:6, borderRadius:"50%", background:"#4ade80", display:"inline-block", boxShadow:"0 0 6px #4ade80" }} />공유 노래 · {songs.length}곡
                  </div>
                  <button className="btn" onClick={()=>setShowAddSong(f=>!f)} style={{ background:showAddSong?"var(--surface2)":"linear-gradient(135deg,#c9943a,#a07828)", color:showAddSong?"var(--text-mute)":"#080604", border:showAddSong?"1px solid var(--border2)":"none", borderRadius:12, padding:"9px 16px", fontSize:13, fontWeight:600 }}>
                    {showAddSong?"✕ 닫기":"+ 노래 추가"}
                  </button>
                </div>
                {showAddSong && (
                  <div className="card fade-up" style={{ padding:20, marginBottom:16, border:"1px solid var(--gold-dim)" }}>
                    <div style={{ fontSize:12, color:"var(--gold)", marginBottom:14 }}>새 노래 추가 — 모두에게 공유됩니다</div>
                    <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                      <input className="input-base jp" value={newSong.title} onChange={e=>setNewSong({...newSong,title:e.target.value})} placeholder="노래 제목 *" style={{flex:2}} />
                      <input className="input-base" value={newSong.artist} onChange={e=>setNewSong({...newSong,artist:e.target.value})} placeholder="아티스트" style={{flex:1}} />
                    </div>
                    <textarea className="input-base jp" value={newSong.lyrics} onChange={e=>setNewSong({...newSong,lyrics:e.target.value})} rows={9} placeholder="가사를 붙여넣으세요 *" style={{ resize:"vertical", lineHeight:1.9, fontSize:15, marginBottom:10 }} />
                    <button className="btn" onClick={addSong} style={{ width:"100%", background:"linear-gradient(135deg,#c9943a,#a07828)", color:"#080604", borderRadius:12, padding:13, fontWeight:700, fontSize:14, boxShadow:"0 4px 16px rgba(212,168,83,.2)" }}>추가하기</button>
                  </div>
                )}
                {loading ? (
                  <div style={{ textAlign:"center", padding:60 }}><Spinner /></div>
                ) : songs.length === 0 ? (
                  <div style={{ textAlign:"center", padding:"60px 0", color:"var(--text-mute)" }}>
                    <div className="jp" style={{ fontSize:40, opacity:.2, marginBottom:16 }}>空</div>
                    <div style={{ fontSize:13 }}>아직 등록된 노래가 없어요</div>
                  </div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {songs.map(s => (
                      <div key={s.id} className="card card-gold" style={{ padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer" }} onClick={()=>setSelectedSong(s)}>
                        <div>
                          <div className="jp" style={{ fontSize:16, color:"var(--text)", marginBottom:4 }}>{s.title}</div>
                          <div style={{ fontSize:11, color:"var(--text-mute)" }}>{s.artist&&`${s.artist} · `}{(s.lyrics||"").split("\n").filter(l=>l.trim()).length}줄 · 추가: {s.added_by}</div>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }} onClick={e=>e.stopPropagation()}>
                          <span style={{ fontSize:11, color:"var(--text-mute)" }}>가사 →</span>
                          <button className="btn" onClick={e=>deleteSong(s.id,e)} style={{ background:"transparent", border:"1px solid var(--border2)", color:"var(--text-mute)", borderRadius:8, padding:"5px 9px", fontSize:11 }}>✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* ════ BOOKMARKS ════ */}
        {tab==="bookmarks" && (
          <div className="fade-in">
            <div style={{ fontSize:12, color:"var(--text-mute)", marginBottom:16, display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ width:6, height:6, borderRadius:"50%", background:"var(--purple)", display:"inline-block", boxShadow:"0 0 6px var(--purple)" }} />
              {nickname}의 단어장 · {bookmarks.length}개
            </div>
            {bookmarks.length === 0 ? (
              <div style={{ textAlign:"center", padding:"60px 0", color:"var(--text-mute)" }}>
                <div className="jp" style={{ fontSize:40, opacity:.2, marginBottom:16 }}>空</div>
                <div style={{ fontSize:13 }}>아직 저장한 단어가 없어요<br/><span style={{fontSize:11}}>검색 후 ☆ 저장 버튼을 눌러보세요</span></div>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {bookmarks.map(b => {
                  let exs=[]; try{exs=JSON.parse(b.examples||"[]");}catch{}
                  return (
                    <div key={b.id} className="card card-purple" style={{ overflow:"hidden" }}>
                      <div style={{ padding:"16px 20px", borderBottom:exs.length?"1px solid var(--border)":"none" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                          <div>
                            <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:4 }}>
                              <span className="jp" style={{ fontSize:24, color:"var(--text)" }}>{b.word}</span>
                              {b.reading && <span style={{ fontSize:12, color:"var(--purple)" }}>{b.reading}</span>}
                              {b.part_of_speech && <span className="tag">{b.part_of_speech}</span>}
                            </div>
                            <div style={{ fontSize:17, color:"var(--gold)", marginBottom:4 }}>{b.meaning_ko}</div>
                            {b.note && <div style={{ fontSize:11, color:"var(--text-mute)", lineHeight:1.6 }}>{b.note}</div>}
                          </div>
                          <button className="btn" onClick={()=>deleteBookmark(b.id)} style={{ background:"transparent", border:"1px solid var(--border2)", color:"var(--text-mute)", borderRadius:8, padding:"5px 9px", fontSize:11, flexShrink:0 }}>✕</button>
                        </div>
                      </div>
                      {exs.slice(0,2).map((ex,i) => (
                        <div key={i} style={{ padding:"10px 20px", borderBottom:i===0&&exs.length>1?"1px solid var(--border)":"none" }}>
                          <div style={{ fontSize:10, color:"var(--text-mute)", marginBottom:4 }}>♪ {ex.songTitle}</div>
                          <div className="jp" style={{ fontSize:13, color:"var(--text-dim)", lineHeight:1.7 }}>{ex.sentence}</div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
